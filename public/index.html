<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Best Buy | Home</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" type="image/x-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f5/Best_Buy_Logo.svg/1280px-Best_Buy_Logo.svg.png">
</head>

<body class="bg-gray-100">
  <nav class="bg-blue-500 text-white shadow-md">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center space-x-3">
        <a href="#">
            <img 
          src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f5/Best_Buy_Logo.svg/1280px-Best_Buy_Logo.svg.png"
          alt="Logo"
          class="w-12"
        />
        </a>
        <a href="#">
        <span class="text-xl font-bold ">Best Buy</span>
        </a>
      </div>
      <ul class="flex items-center space-x-6 font-medium">

        <li class="hover:text-yellow-300 cursor-pointer transition">Home</li>
        <li class="hover:text-yellow-300 cursor-pointer transition">Products</li>
        <li class="hover:text-yellow-300 cursor-pointer transition">Add Product</li>
        <li class="relative cursor-pointer">
          <svg xmlns="http://www.w3.org/2000/svg" 
               class="w-7 h-7 hover:text-yellow-300 transition" 
               fill="none" 
               viewBox="0 0 24 24" 
               stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-1.5 7h11M10 21a1 1 0 100-2 1 1 0 000 2zm8 0a1 1 0 100-2 1 1 0 000 2z"/>
          </svg>
          <span class="absolute -top-2 -right-2 bg-yellow-400 text-blue-900 text-xs font-bold 
                       w-5 h-5 flex items-center justify-center rounded-full">
            3
          </span>

        </li>

      </ul>

    </div>
  </nav>

<section class="relative w-full h-[500px]">
  <img 
    src="https://gray-wtoc-prod.gtv-cdn.com/resizer/v2/CJDZ7F22KFFYNL5X67J5BS6OGE.jpg?auth=40f9862c78e602bcb58fde65038dba72de2bfe0b53e86ee9561642557eb54464&width=800&height=450&smart=true"
    class="w-full h-full object-cover"
  />
  <div class="absolute inset-0 bg-black bg-opacity-50"></div>
  <div class="absolute inset-0 flex flex-col items-center justify-center text-white text-center">
    <h1 class="text-7xl font-bold mb-4">WELCOME TO <br><span class="text-blue-500">BEST</span> <span class="text-yellow-300">BUY</span> <br>SUPERMARKER</h1>
    <p class="text-lg mb-6">Shop Smart. Shop Fast. Shop Better.</p>
    <div class="flex items-center space-x-3">
    <button class=" p-5 bg-yellow-400 px-8 py-3 mt-4 shadow-lg font-semibold hover:bg-yellow-300 transition">
     Explore products
    </button>
     <button class=" p-5 bg-blue-500 px-8 py-3 shadow-lg mt-4 font-semibold hover:bg-blue-300 transition">
     Add product
    </button>
    </div>
  </div>

</section>
<section class="mb-2 text-center bg-yellow-400 py-12 shadow-md">
  <h1 class="text-5xl font-bold text-white tracking-wide">
    Our Products
  </h1>
  <p class="mt-4 text-blue-800 text-lg">
    Browse our latest supermarket items
  </p>
</section>
<section class="mt-10">
  <div class="max-w-6xl mx-auto px-6">
    <div class="flex flex-wrap gap-6 justify-center">

      <div class="relative group">
        <button class="bg-blue-600 text-white px-8 py-3 rounded-lg text-lg font-semibold shadow-md hover:bg-blue-500 transition">
          Sort
        </button>
        <div class="absolute hidden group-hover:block mt-2 w-48 bg-white rounded-lg shadow-lg overflow-hidden z-10">
          <a href="#" class="block px-4 py-3 hover:bg-gray-100 text-gray-700">Newest</a>
          <a href="#" class="block px-4 py-3 hover:bg-gray-100 text-gray-700">Oldest</a>
          <a href="#" class="block px-4 py-3 hover:bg-gray-100 text-gray-700">Popular</a>
        </div>
      </div>

      <div class="relative group">
        <button class="bg-blue-600 text-white px-8 py-3 rounded-lg text-lg font-semibold shadow-md hover:bg-blue-500 transition">
          Genre
        </button>
        <div class="absolute hidden group-hover:block mt-2 w-48 bg-white rounded-lg shadow-lg overflow-hidden z-10">
          <a href="#" class="block px-4 py-3 hover:bg-gray-100 text-gray-700">Electronics</a>
          <a href="#" class="block px-4 py-3 hover:bg-gray-100 text-gray-700">Appliances</a>
          <a href="#" class="block px-4 py-3 hover:bg-gray-100 text-gray-700">Accessories</a>
        </div>
      </div>

      <div class="relative group">
        <button class="bg-blue-600 text-white px-8 py-3 rounded-lg text-lg font-semibold shadow-md hover:bg-blue-500 transition">
          Price
        </button>
        <div class="absolute hidden group-hover:block mt-2 w-48 bg-white rounded-lg shadow-lg overflow-hidden z-10">
          <a href="#" class="block px-4 py-3 hover:bg-gray-100 text-gray-700">Low to High</a>
          <a href="#" class="block px-4 py-3 hover:bg-gray-100 text-gray-700">High to Low</a>
        </div>
      </div>

      <div class="relative group">
        <button class="bg-yellow-400 text-blue-900 px-8 py-3 rounded-lg text-lg font-semibold shadow-md hover:bg-yellow-300 transition">
          Filter
        </button>
        <div class="absolute hidden group-hover:block mt-2 w-48 bg-white rounded-lg shadow-lg overflow-hidden z-10">
          <a href="#" class="block px-4 py-3 hover:bg-gray-100 text-gray-700">In Stock</a>
          <a href="#" class="block px-4 py-3 hover:bg-gray-100 text-gray-700">Out of Stock</a>
          <a href="#" class="block px-4 py-3 hover:bg-gray-100 text-gray-700">On Sale</a>
        </div>
      </div>

    </div>
  </div>
</section>
<section class="mt-5 mb-9">
    <div class="products"></div>
</section>
</body>
<script src="../index.mjs">

</script>
</html>
